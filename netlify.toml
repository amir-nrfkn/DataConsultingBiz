# Netlify build & deployment configuration for Veylor Advisory.
#
# - Uses Astro's static build output in dist/.
# - Security headers applied to all routes.
# - Immutable caching for hashed static assets.
# - Netlify form detection is automatic (no extra config needed).

[build]
  command   = "npm run build"
  publish   = "dist"

# ──────────────────────────────────────────────
# Security & caching headers
# ──────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection         = "1; mode=block"

# Cache hashed assets aggressively (Astro adds content hashes to filenames).
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ──────────────────────────────────────────────
# Redirects
# ──────────────────────────────────────────────

# Redirect any trailing-slash variants to clean URLs.
[[redirects]]
  from   = "/thank-you/"
  to     = "/thank-you"
  status = 301

[[redirects]]
  from   = "/privacy/"
  to     = "/privacy"
  status = 301
